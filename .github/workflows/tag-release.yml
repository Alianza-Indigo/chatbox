name: Tag and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.3.0)'
        required: true
        default: 'v0.3.0'

jobs:
  tag-and-release:
    name: Create tag and GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section and write to file
        run: |
          VERSION="${{ inputs.version }}"
          VERSION_NUM="${VERSION#v}"

          awk "/^## \[${VERSION_NUM}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > /tmp/notes.md

          # Fallback if section not found
          if [ ! -s /tmp/notes.md ]; then
            echo "See CHANGELOG.md for details." > /tmp/notes.md
          fi

          echo "--- Release notes preview ---"
          cat /tmp/notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ inputs.version }}"

          if gh release view "$VERSION" > /dev/null 2>&1; then
            gh release edit "$VERSION" \
              --title "$VERSION" \
              --notes-file /tmp/notes.md
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file /tmp/notes.md \
              --target "${{ github.ref_name }}"
          fi
